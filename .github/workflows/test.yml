name: RMD Agent Tests

on:
  push:
    branches: [main]
    paths: ['agents/rmd/**']
  pull_request:
    branches: [main]
    paths: ['agents/rmd/**']

jobs:
  test-rmd:
    name: RMD fixtures — correctness + stability
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      # Sub-agent is pure Python — no LLM, no AWS credentials needed (P15, Task 13)
      # Run 3 times for stability check (P14)
      - name: Run fixtures (run 1 of 3)
        run: uv run python agents/rmd/run_tests.py

      - name: Run fixtures (run 2 of 3)
        run: uv run python agents/rmd/run_tests.py

      - name: Run fixtures (run 3 of 3) + latency report
        run: uv run python agents/rmd/run_tests.py --latency

name: RMD Agent Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-rmd:
    name: RMD fixtures (18/18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run RMD fixtures
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: agents/rmd
        run: uv run --project ${{ github.workspace }} python run_tests.py
